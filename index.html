<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Architect Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        .dashboard { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; max-width: 500px; width: 100%; }
        h1 { color: #2c3e50; }
        .recipe-box { margin-top: 20px; padding: 20px; background-color: #e8f8f5; border-left: 5px solid #1abc9c; border-radius: 5px; text-align: left;}
        .inventory-list { text-align: left; background: #fef9e7; padding: 15px; border-radius: 5px; margin-top: 15px;}
    </style>
</head>
<body>
    <div class="dashboard">
        <h1 id="greeting">Loading System...</h1>

        <div class="recipe-box">
            <h3>🍽️ Dinner Suggestion:</h3>
            <p id="suggestion">Checking the fridge...</p>
        </div>

        <div class="inventory-list">
            <h3>📦 Current Fridge Inventory:</h3>
            <ul id="inventory">
                <li>Loading...</li>
            </ul>
        </div>
        <p style="font-size: 0.8em; color: gray;">Live update active. Try saving changes to inventory.txt!</p>
    </div>

    <script>
        // פונקציה שפונה לשרת הפייתון ומעדכנת את ה-HTML
        async function fetchDashboardData() {
            try {
                const response = await fetch('/api');
                const data = await response.json();

                document.getElementById('greeting').innerText = data.greeting;
                document.getElementById('suggestion').innerText = data.suggestion;

                const inventoryList = document.getElementById('inventory');
                inventoryList.innerHTML = ''; // מנקה את הרשימה הישנה
                data.inventory.forEach(item => {
                    const li = document.createElement('li');
                    li.innerText = item;
                    inventoryList.appendChild(li);
                });
            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        // קורא לפונקציה פעם אחת מיד, ואז כל 3 שניות
        fetchDashboardData();
        setInterval(fetchDashboardData, 3000);
    </script>
</body>
</html>
